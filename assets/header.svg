<svg viewBox="0 0 1200 310" xmlns="http://www.w3.org/2000/svg" width="1200" height="310">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0a0f1a"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <!-- Cyan glow bottom-left -->
    <radialGradient id="glow1" cx="12%" cy="90%" r="45%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Cyan glow top-right -->
    <radialGradient id="glow2" cx="88%" cy="10%" r="40%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Purple accent glow center -->
    <radialGradient id="glow3" cx="50%" cy="55%" r="35%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow filter for cyan text -->
    <filter id="cyanglow" x="-15%" y="-40%" width="130%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft glow filter -->
    <filter id="softglow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip for scan-line -->
    <clipPath id="heroClip">
      <rect width="1200" height="310"/>
    </clipPath>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="310" fill="url(#heroBg)"/>
  <!-- Glow overlays -->
  <rect width="1200" height="310" fill="url(#glow1)"/>
  <rect width="1200" height="310" fill="url(#glow2)"/>
  <rect width="1200" height="310" fill="url(#glow3)"/>

  <!-- Subtle dot grid pattern -->
  <g opacity="0.04" fill="#00d4ff">
    <circle cx="60"  cy="40"  r="1.5"/><circle cx="180" cy="40"  r="1.5"/><circle cx="300" cy="40"  r="1.5"/>
    <circle cx="420" cy="40"  r="1.5"/><circle cx="540" cy="40"  r="1.5"/><circle cx="660" cy="40"  r="1.5"/>
    <circle cx="780" cy="40"  r="1.5"/><circle cx="900" cy="40"  r="1.5"/><circle cx="1020" cy="40" r="1.5"/>
    <circle cx="1140" cy="40" r="1.5"/>
    <circle cx="60"  cy="155" r="1.5"/><circle cx="180" cy="155" r="1.5"/><circle cx="300" cy="155" r="1.5"/>
    <circle cx="420" cy="155" r="1.5"/><circle cx="780" cy="155" r="1.5"/><circle cx="900" cy="155" r="1.5"/>
    <circle cx="1020" cy="155" r="1.5"/><circle cx="1140" cy="155" r="1.5"/>
    <circle cx="60"  cy="270" r="1.5"/><circle cx="180" cy="270" r="1.5"/><circle cx="300" cy="270" r="1.5"/>
    <circle cx="420" cy="270" r="1.5"/><circle cx="540" cy="270" r="1.5"/><circle cx="660" cy="270" r="1.5"/>
    <circle cx="780" cy="270" r="1.5"/><circle cx="900" cy="270" r="1.5"/><circle cx="1020" cy="270" r="1.5"/>
    <circle cx="1140" cy="270" r="1.5"/>
  </g>

  <!-- Floating particles -->
  <circle cx="120" cy="80" r="2" fill="#00d4ff" opacity="0.3">
    <animate attributeName="cy" values="80;60;80" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="200" r="1.5" fill="#00d4ff" opacity="0.2">
    <animate attributeName="cy" values="200;180;200" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="90" r="2.5" fill="#00d4ff" opacity="0.25">
    <animate attributeName="cy" values="90;70;90" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0.6;0.25" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1080" cy="230" r="2" fill="#7c3aed" opacity="0.35">
    <animate attributeName="cy" values="230;210;230" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0.65;0.35" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="220" cy="260" r="1.8" fill="#7c3aed" opacity="0.2">
    <animate attributeName="cy" values="260;240;260" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1020" cy="60" r="1.5" fill="#00d4ff" opacity="0.2">
    <animate attributeName="cy" values="60;45;60" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.55;0.2" dur="5.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Animated scan-line sweeping across -->
  <rect x="0" y="-2" width="1200" height="2" fill="#00d4ff" opacity="0.12" clip-path="url(#heroClip)">
    <animate attributeName="y" values="-2;312" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.12;0" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Top border accent (animated) -->
  <rect x="0" y="0" width="1200" height="2" fill="#00d4ff">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Location badge -->
  <rect x="455" y="34" width="290" height="36" rx="18" fill="#161b22" stroke="#30363d" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="1;0.4;1" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- Pin icon -->
  <path d="M478 47 C478 43.5 480.5 41 484 41 C487.5 41 490 43.5 490 47 C490 51.5 484 57 484 57 C484 57 478 51.5 478 47 Z" fill="none" stroke="#8b949e" stroke-width="1.4"/>
  <circle cx="484" cy="47" r="2" fill="#8b949e"/>
  <text x="497" y="57" font-family="'Segoe UI', system-ui, Arial, sans-serif" font-size="13.5" fill="#8b949e">Palakkad, Kerala, India</text>

  <!-- Main heading: "Hassan Huda" centered, two-tone -->
  <text x="600" y="172" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="92" font-weight="900" text-anchor="middle" letter-spacing="-2">
    <tspan fill="#ffffff">Hassan </tspan><tspan fill="#00d4ff" filter="url(#cyanglow)">
      Huda
      <animate attributeName="fill" values="#00d4ff;#4de8ff;#00d4ff" dur="4s" repeatCount="indefinite"/>
    </tspan>
  </text>

  <!-- Description line 1 -->
  <text x="600" y="228" font-family="'Segoe UI', system-ui, Arial, sans-serif" font-size="15.5" fill="#6e7681" text-anchor="middle">
    Building intelligent systems that automate workflows, integrate LLMs into production,
  </text>
  <!-- Description line 2 -->
  <text x="600" y="252" font-family="'Segoe UI', system-ui, Arial, sans-serif" font-size="15.5" fill="#6e7681" text-anchor="middle">
    and turn complex data into actionable insights.
  </text>

  <!-- Bottom border accent (animated) -->
  <rect x="0" y="308" width="1200" height="2" fill="#00d4ff" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
