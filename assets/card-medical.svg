<svg viewBox="0 0 570 188" xmlns="http://www.w3.org/2000/svg" width="570" height="188">
  <defs>
    <linearGradient id="medicalBg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <filter id="medicalTf">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="570" height="188" rx="12" fill="url(#medicalBg)"/>

  <rect x="1" y="1" width="568" height="186" rx="11" fill="none" stroke="#00d4ff" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.7;0.2;0.7" dur="2.8s" repeatCount="indefinite"/>
  </rect>

  <rect x="0" y="0" width="570" height="3" rx="1.5" fill="#00d4ff">
    <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
  </rect>

  <g transform="translate(22,18)" stroke="#00d4ff" fill="none">
    <rect width="18" height="15" rx="2" stroke-width="1.5"/>
    <path d="M0 5 H18" stroke-width="1" opacity="0.5"/>
    <rect x="3" y="-4" width="7" height="5" rx="1" stroke-width="1.4"/>
  </g>

  <text x="48" y="31" font-family="'Segoe UI','SF Pro Display',system-ui,sans-serif"
        font-size="16.5" font-weight="700" fill="#00d4ff" filter="url(#medicalTf)">
    medical-patient-routing-assistant
  </text>

  <text x="22" y="62" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" fill="#8b949e">
    Intelligent medical patient routing system powered by Groq LLaMA
  </text>
  <text x="22" y="80" font-family="'Segoe UI',system-ui,sans-serif" font-size="12.5" fill="#8b949e">
    for AI-driven smart triage and patient workflow automation.
  </text>

  <circle cx="26" cy="110" r="6" fill="#3572A5"/>
  <text x="38" y="114" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#8b949e">Python</text>

  <line x1="22" y1="130" x2="548" y2="130" stroke="#30363d" stroke-width="1" opacity="0.5"/>

  <rect x="22"  y="142" width="62" height="22" rx="11" fill="#009688"/>
  <text x="53"  y="157" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#fff" text-anchor="middle">FastAPI</text>

  <rect x="92"  y="142" width="78" height="22" rx="11" fill="#0099bb"/>
  <text x="131" y="157" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#fff" text-anchor="middle">Groq LLaMA</text>

  <rect x="178" y="142" width="54" height="22" rx="11" fill="#3776AB"/>
  <text x="205" y="157" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#fff" text-anchor="middle">Python</text>
</svg>
